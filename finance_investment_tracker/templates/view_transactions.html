<!DOCTYPE html>
<html lang="en">
<head>
    <title>View Transactions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>All Transactions</h1>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Notes</th>
                <th>Goal</th>
            </tr>
        </thead>
        <tbody>
            {% for tx in transactions %}
                <tr>
                    <td>{{ tx.id }}</td>
                    <td>{{ tx.type }}</td>
                    <td>{{ tx.category }}</td>
                    <td>{{ tx.amount }}</td>
                    <td>{{ tx.date }}</td>
                    <td>{{ tx.notes }}</td>
                    <td>{{ tx.goal_name or "-" }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{{ url_for('index') }}">Back to Dashboard</a>
</body>
</html>
